name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Upload plugin DLL
        uses: actions/upload-artifact@v4
        with:
          name: Jellyfin.Plugin.JellyExport
          path: Jellyfin.Plugin.JellyExport/bin/Release/net9.0/Jellyfin.Plugin.JellyExport.dll
